pack:
  id: onto_canon_psyop_seed
  version: "0.1.0"
  name: "onto-canon PSYOP Seed Slice"
  description: "Minimal donor pack extracted from onto-canon predecessor vocabulary for the PSYOP/MISO seed slice."

build:
  compiler_version: "0.1.0"
  built_at: "2026-03-14T00:00:00Z"
  source_inputs:
    - system: onto_canon_sumo_plus
      version: "2026-02-15"
      path: "archive://onto-canon/data/sumo_plus.db"
    - system: onto_canon_stage1_evidence
      version: "2026-02-15"
      path: "archive://onto-canon/data/stage1/evidence.csv"

content:
  entity_types: entity_types.jsonl
  predicate_types: predicate_types.jsonl
  role_types: role_types.jsonl
  value_types: value_types.jsonl
  hierarchy_edges: hierarchy_edges.jsonl
  predicate_role_edges: predicate_role_edges.jsonl
  source_mappings: source_mappings.jsonl
  aliases: aliases.jsonl
  constraints: constraints.jsonl
