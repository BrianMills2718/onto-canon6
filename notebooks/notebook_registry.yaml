          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "overlay_aware_reporting"
        title: "Overlay-Aware Reporting"
        purpose: "Show the resulting accepted proposal and overlay content through a small report-friendly surface."
        input_artifact: "overlay_application_record"
        output_artifact: "overlay_aware_report"
        acceptance_criteria:
          - "Accepted proposals and applied overlay content are inspectable together."
          - "The report stays grounded in persisted state."
          - "The phase runs live in the canonical journey notebook."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/cli.py"
          - "src/onto_canon6/surfaces/review_report.py"
        related_tests:
          - "tests/integration/test_cli_flow.py"
        related_docs:
          - "docs/STATUS.md"
        related_evidence:
          - "notebooks/05_review_reporting_slice.ipynb"
          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "domain_pack_generalization"
        title: "Domain Pack Generalization"
        purpose: "Prove the second-pack workflow using one local DoDAF minimal pack with strict and mixed profiles over the same vocabulary."
        input_artifact: "overlay_aware_report"
        output_artifact: "second_pack_proof"
        acceptance_criteria:
          - "One local second pack loads through the same pack/profile machinery as the donor packs."
          - "A strict profile and a mixed profile share the same starting pack vocabulary."
          - "The same review and overlay workflow works for the second pack without core branching."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/ontology_runtime/loaders.py"
          - "src/onto_canon6/pipeline/service.py"
          - "ontology_packs/dodaf_minimal/0.1.0/manifest.yaml"
          - "profiles/dodaf_minimal_strict/0.1.0/manifest.yaml"
          - "profiles/dodaf_minimal_mixed/0.1.0/manifest.yaml"
        related_tests:
          - "tests/ontology_runtime/test_dodaf_minimal.py"
          - "tests/integration/test_dodaf_minimal_cli.py"
        related_docs:
          - "docs/plans/0001_successor_roadmap.md"
        related_evidence:
          - "notebooks/13_dodaf_minimal_second_pack.ipynb"
      - phase_id: "artifact_lineage_recovery"
        title: "Artifact Lineage Recovery"
        purpose: "Plan the recovery of artifact-backed provenance without rebuilding a fused runtime."
        input_artifact: "second_pack_plan"
        output_artifact: "artifact_lineage_contract"
        acceptance_criteria:
          - "The notebook emits an explicit provisional artifact-lineage contract."
          - "Downstream phases consume that contract rather than inventing lineage state."
          - "The phase remains explicitly provisional."
        status: "planned"
        execution_mode: "stub"
        promotion_path: "Promote this phase when typed artifact references, storage, and lineage reporting exist with tests."
        related_docs:
          - "docs/plans/0001_successor_roadmap.md"
          - "notebooks/11_future_phase_breakdown.ipynb"
      - phase_id: "epistemic_extension"
        title: "Epistemic Extension"
        purpose: "Plan the first optional epistemic slice without moving epistemic policy into the core workflow."
        input_artifact: "artifact_lineage_contract"
        output_artifact: "epistemic_extension_contract"
        acceptance_criteria:
          - "The notebook emits an explicit provisional epistemic contract artifact."
          - "The contract names the smallest intended operator set."
          - "The phase remains explicitly provisional."
        status: "planned"
        execution_mode: "stub"
        promotion_path: "Promote this phase when the extension-local models and operators exist with tests and one notebook proof."
        related_docs:
          - "docs/plans/0001_successor_roadmap.md"
          - "notebooks/11_future_phase_breakdown.ipynb"
      - phase_id: "product_facing_workflow_integration"
        title: "Product-Facing Workflow Integration"
        purpose: "Plan the single outward-facing workflow that will justify the successor as a real product slice."
        input_artifact: "epistemic_extension_contract"
        output_artifact: "product_workflow_plan"
        acceptance_criteria:
          - "The notebook emits an explicit provisional workflow plan artifact."
          - "The plan names the chosen outward-facing boundary and success test."
          - "The phase remains explicitly provisional."
        status: "planned"
        execution_mode: "stub"
        promotion_path: "Promote this phase when one real workflow can be run end to end without ad hoc Python editing."
        related_docs:
