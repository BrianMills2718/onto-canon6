journeys:
  - journey_id: "governed_text_to_reviewed_assertions"
    title: "Governed Text To Reviewed Assertions"
    purpose: "Turn raw source text into reviewable candidate assertions, accepted ontology proposals, and overlay-aware report state through the current successor workflow."
    notebook: "notebooks/00_master_governed_text_to_reviewed_assertions.ipynb"
    notebook_mode: "mixed"
    status: "partial"
    related_docs:
      - "README.md"
      - "docs/SUCCESSOR_CHARTER.md"
      - "docs/STATUS.md"
      - "docs/plans/0001_successor_roadmap.md"
      - "docs/adr/0004-keep-text-derived-candidate-assertions-grounded-in-source-evidence-and-route-llm-work-through-llm_client.md"
      - "docs/adr/0006-prefer-cli-as-the-first-operational-surface-before-mcp-or-ui.md"
      - "docs/adr/0007-adopt-canonical-journey-notebooks-with-an-explicit-registry.md"
      - "notebooks/README.md"
    related_tests:
      - "tests/integration/test_cli_flow.py"
      - "tests/integration/test_notebook_process.py"
    related_evidence:
      - "notebooks/12_cli_surface.ipynb"
    phases:
      - phase_id: "source_artifact_preparation"
        title: "Source Artifact Preparation"
        purpose: "Load one real source file and expose it as the explicit source artifact for the rest of the journey."
        input_artifact: "raw_text_file"
        output_artifact: "source_artifact"
        acceptance_criteria:
          - "A concrete source file exists and is loaded explicitly."
          - "The downstream workflow receives a named source artifact rather than hidden notebook state."
          - "The phase can run live in the canonical journey notebook."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/cli.py"
          - "src/onto_canon6/pipeline/models.py"
        related_tests:
          - "tests/integration/test_cli_flow.py"
        related_docs:
          - "docs/adr/0006-prefer-cli-as-the-first-operational-surface-before-mcp-or-ui.md"
        related_evidence:
          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "candidate_assertion_extraction"
        title: "Candidate Assertion Extraction"
        purpose: "Produce candidate assertions from raw text while keeping source grounding explicit."
        input_artifact: "source_artifact"
        output_artifact: "candidate_assertion_batch"
        acceptance_criteria:
          - "The phase emits candidate assertions with source grounding."
          - "The canonical journey notebook uses an explicit fixture-shaped extractor stand-in rather than hidden invention."
          - "Real extraction code, tests, and benchmark evidence remain linked separately."
        status: "proven"
        execution_mode: "fixture"
        related_code:
          - "src/onto_canon6/pipeline/text_extraction.py"
          - "src/onto_canon6/pipeline/service.py"
          - "prompts/extraction/text_to_candidate_assertions.yaml"
        related_tests:
          - "tests/pipeline/test_text_extraction.py"
          - "tests/integration/test_cli_flow.py"
        related_docs:
          - "docs/adr/0004-keep-text-derived-candidate-assertions-grounded-in-source-evidence-and-route-llm-work-through-llm_client.md"
        related_evidence:
          - "notebooks/08_text_extraction_slice.ipynb"
          - "notebooks/10_live_extraction_evaluation.ipynb"
          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "candidate_listing_and_inspection"
        title: "Candidate Listing And Inspection"
        purpose: "Expose pending candidate assertions for explicit inspection through the first operational surface."
        input_artifact: "candidate_assertion_batch"
        output_artifact: "candidate_listing"
        acceptance_criteria:
          - "A user can inspect persisted candidates without direct Python calls."
          - "The listing reflects the persisted review store."
          - "The phase runs live through the CLI."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/cli.py"
          - "src/onto_canon6/surfaces/review_report.py"
          - "src/onto_canon6/pipeline/service.py"
        related_tests:
          - "tests/integration/test_cli_flow.py"
        related_docs:
          - "docs/STATUS.md"
        related_evidence:
          - "notebooks/05_review_reporting_slice.ipynb"
          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "candidate_review"
        title: "Candidate Review"
        purpose: "Record an explicit accept or reject decision for the candidate assertion."
        input_artifact: "candidate_listing"
        output_artifact: "candidate_review_record"
        acceptance_criteria:
          - "Candidate review decisions are explicit and persisted."
          - "Invalid review transitions fail loudly."
          - "The phase runs live through the CLI."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/cli.py"
          - "src/onto_canon6/pipeline/service.py"
          - "src/onto_canon6/pipeline/store.py"
        related_tests:
          - "tests/pipeline/test_review_service.py"
          - "tests/integration/test_cli_flow.py"
        related_docs:
          - "docs/plans/0001_successor_roadmap.md"
        related_evidence:
          - "notebooks/04_review_slice.ipynb"
          - "notebooks/12_cli_surface.ipynb"
      - phase_id: "proposal_review"
        title: "Proposal Review"
        purpose: "Accept or reject ontology proposals created by mixed-mode validation."
        input_artifact: "candidate_review_record"
        output_artifact: "proposal_review_record"
        acceptance_criteria:
          - "Proposal review remains explicit and separate from candidate review."
          - "Acceptance policy is observable."
          - "The phase runs live through the CLI."
        status: "proven"
        execution_mode: "live"
        proof_critical: true
        related_code:
          - "src/onto_canon6/cli.py"
          - "src/onto_canon6/pipeline/service.py"
        related_tests:
          - "tests/pipeline/test_review_service.py"
          - "tests/integration/test_cli_flow.py"
        related_docs:
