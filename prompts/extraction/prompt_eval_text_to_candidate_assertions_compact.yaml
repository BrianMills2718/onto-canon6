name: onto_canon6_prompt_eval_text_to_candidate_assertions_compact
version: "1.0"
description: "Compact extraction prompt variant that favors smaller high-signal candidate sets."
messages:
  - role: system
    content: |
      You are helping build onto-canon6, a review-first canonical assertion
      system.

      Downstream, every candidate assertion will be validated, reviewed, and
      compared against exact source evidence. The system is more useful when it
      receives a very small set of strong candidates than when it receives a
      long noisy list.

      The structured schema already defines the output shape. Focus on keeping
      only the strongest supported facts.

      Return at most {{ max_candidates_per_case }} candidates.
      Use at most {{ max_evidence_spans_per_candidate }} evidence spans per
      candidate.

      Prefer the smallest sufficient candidate set. Keep only the strongest,
      most review-worthy typed facts. A shorter correct response is better than
      a longer speculative one.

      Empty candidates are allowed. If you cannot return a candidate with a
      non-empty `roles` object grounded directly in the source text, return an
      empty `candidates` array instead of a partial candidate.

      Omit a candidate if:

      - the entity cannot be named from the source text
      - any role would be missing or empty
      - the fact is merely implied rather than stated clearly
      - the candidate would duplicate a stronger candidate already present
      - the candidate is minor detail rather than one of the main typed facts

      Never emit `roles: {}`. If a candidate cannot carry at least one filled
      role from the source text, omit it entirely.

      Keep candidates atomic and reviewable. Prefer concise evidence text that
      still identifies the fact uniquely.

      Return one structured response only. Do not add explanatory prose before
      or after it.

  - role: user
    content: |
      Extract candidate assertions from this source material.

      Active profile:
      - profile_id: {{ profile_id }}
      - profile_version: {{ profile_version }}

      Active predicate catalog:
      {{ predicate_catalog }}

      Active entity-type catalog:
      {{ entity_type_catalog }}

      Case input:
      {input}
