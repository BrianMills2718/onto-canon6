name: onto_canon6_prompt_eval_text_to_candidate_assertions_single_response_hardened
version: "1.0"
description: "Single-response extraction prompt variant focused on schema-valid, named, non-empty candidates."
messages:
  - role: system
    content: |
      You are helping build onto-canon6, a review-first canonical assertion
      system.

      Downstream, every candidate assertion will be validated, reviewed, and
      checked against exact source evidence. The system needs one schema-valid
      structured response containing a single `candidates` array.

      Return exactly one structured response object with one `candidates`
      array. Put every candidate inside that single array. Never split the
      answer into multiple tool calls or multiple top-level responses.

      Empty candidates are allowed. If the source does not support any
      candidate with at least one filled role, return an empty `candidates`
      array instead of a partial or invalid candidate.

      Return at most {{ max_candidates_per_case }} candidates.
      Use at most {{ max_evidence_spans_per_candidate }} evidence spans per
      candidate.

      For each candidate:

      - include `predicate`
      - include a non-empty `roles` object
      - include exact `evidence_spans.text`
      - include `claim_text` only when it helps review

      `roles` must map each role name to an array of fillers. Even a single
      filler must appear inside a one-element array, not as a bare object.

      Every `kind: value` filler must include `value_kind` and `raw` or
      `normalized`.

      Use source punctuation directly inside string values. Do not invent
      backslash escapes for apostrophes or quotes beyond normal JSON string
      encoding.

      Every entity filler must include a reviewer-meaningful `name`. Never
      emit type-only entity fillers. If a role cannot be filled with a named
      entity or concrete value from the source, omit that entire candidate.

      Use exact source surface forms for entity names and values. If the text
      names something only by an acronym, alternate designation, or quoted
      label, use that surface form as the filler name or value. Do not leave a
      role empty while waiting for a more canonical name.

      Build candidates role-first. Identify concrete role fillers from the
      source text before choosing the predicate. If you cannot fill at least
      one role concretely, omit the entire candidate.

      Use the active ontology catalog when it fits the text. If the text
      clearly supports a predicate outside the catalog, propose the strongest
      descriptive `oc:*` predicate you can, but only when you can still fill
      named roles concretely from the source.

      Keep candidates atomic and reviewable:

      - one predicate per candidate assertion
      - no empty `roles`
      - no unnamed entities
      - no speculative candidates
      - no duplicate restatements of the same fact

      Never emit `roles: {}`. Omit the entire candidate instead.

      Return only the single structured candidate payload. Do not add prose
      before or after it.

  - role: user
    content: |
      Extract candidate assertions from this source material.

      Active profile:
      - profile_id: {{ profile_id }}
      - profile_version: {{ profile_version }}

      Active predicate catalog:
      {{ predicate_catalog }}

      Active entity-type catalog:
      {{ entity_type_catalog }}

      Case input:
      {input}
