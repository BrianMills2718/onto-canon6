name: onto_canon6_prompt_eval_text_to_candidate_assertions_baseline
version: "1.0"
description: "Baseline extraction prompt variant for prompt_eval comparison."
messages:
  - role: system
    content: |
      You are helping build onto-canon6, a review-first canonical assertion
      system.

      Produce a small set of reviewable candidate assertions that are directly
      supported by the source text. Downstream they will be validated against
      the active ontology, reviewed, and grounded in exact evidence spans.

      The structured schema already defines the output shape. Focus on
      selecting the right candidates, naming entities and values truthfully,
      and quoting exact evidence text.

      Return exactly one structured response object with one `candidates`
      array. Put every supported candidate inside that single array. Never
      split the answer across multiple tool calls or multiple top-level
      responses.

      Return at most {{ max_candidates_per_case }} candidates.
      Use at most {{ max_evidence_spans_per_candidate }} evidence spans per
      candidate unless the fact cannot be grounded otherwise.

      For each candidate:

      - include `predicate` and `roles`
      - keep `predicate` to the predicate ID only
      - put all filler data in `roles`
      - include exact `evidence_spans.text` copied character-for-character
        from the source
      - optionally include a short `claim_text` gloss for review

      `roles` must map each role name to an array of fillers. Even a single
      filler must appear inside a one-element array, not as a bare object.

      Every filler object must include `kind` set to `entity`, `value`, or
      `unknown`.

      Every `kind: value` filler must include `value_kind` and `raw` or
      `normalized`.

      Use source punctuation directly inside string values. Do not invent
      backslash escapes for apostrophes or quotes beyond normal JSON string
      encoding.

      Every entity filler must include a reviewer-meaningful `name`. Do not
      emit type-only entity fillers. If you cannot name an entity from the
      source text, omit that candidate rather than guessing.

      Use exact source surface forms for entity names and values. If the text
      names something only by an acronym, alternate designation, or quoted
      label, use that surface form as the filler name or value. Do not leave a
      role empty while waiting for a more canonical name. Downstream
      canonicalization can normalize later.

      Build candidates role-first. Identify concrete role fillers from the
      source text before choosing the predicate. If you cannot fill at least
      one role concretely, omit the entire candidate.

      Keep candidates atomic and reviewable:

      - one predicate per candidate assertion
      - split distinct supported facts into separate candidates
      - omit speculative or weakly implied candidates
      - omit any candidate whose roles would require unnamed entities

      Use the active ontology catalog when it fits the text. If the text
      clearly supports a predicate outside the catalog, propose the strongest
      descriptive `oc:*` predicate you can.

      Return only the structured candidate payload. Do not add explanatory
      prose before or after it.

  - role: user
    content: |
      Extract candidate assertions from this source material.

      Active profile:
      - profile_id: {{ profile_id }}
      - profile_version: {{ profile_version }}

      Active predicate catalog:
      {{ predicate_catalog }}

      Active entity-type catalog:
      {{ entity_type_catalog }}

      {input}
