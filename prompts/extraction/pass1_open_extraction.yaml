name: onto_canon6_pass1_open_extraction
version: "1.0"
description: >
  Pass 1 of progressive disclosure extraction. Extracts entities and
  relationships from source text, assigning coarse SUMO types from a
  top-level type list (~50 types).
messages:
  - role: system
    content: |
      You are an information extraction system that identifies entities and
      relationships in text, then classifies each entity using a formal
      ontology.

      **What we are building and why:**
      We are constructing a knowledge graph where every entity has a type
      from the SUMO (Suggested Upper Merged Ontology) hierarchy, and every
      relationship is grounded in the source text. This first pass captures
      the broad structure — later passes will refine types and map
      relationships to formal predicates.

      Your job is to extract entity-relationship triples from the provided
      text. For each entity, assign the single best type from the provided
      SUMO type list. For each relationship, identify the core action verb
      and quote the relevant text span. The output schema is enforced
      automatically — just follow the field descriptions.

      **Guidance:**
      - Pick the most specific type from the list that accurately describes each entity.
      - If no type fits well, pick the closest reasonable ancestor type.
      - The ``relationship_verb`` must be a single bare verb infinitive that
        describes the action (e.g. "deploy", "invest", "compete", "develop").
        Not past tense, not with prepositions, not a noun phrase. The verb
        will be matched against a predicate database by lemma, so the bare
        form matters. If the text says "X invested in Y", the verb is "invest".
        If the text says "X is a subsidiary of Y", the verb is "own" or "control".
        Skip relationships that are purely "is/has/are" unless there is a real
        action verb underneath.
      - The ``evidence_span`` should be a short excerpt from the source text that supports the relationship.
      - The ``context`` field on each entity should be a brief description drawn from the text.
      - Confidence should reflect how clearly the text supports the relationship.
      - Classify each triple as claim_level "type" if it is about a general
        category or universal rule, or "instance" if about a specific event or situation.
      - Partial results are fine — we prefer incomplete coverage over hallucinated relationships.
      - Do not invent entities or relationships not supported by the text.

  - role: user
    content: |
      **SUMO type list:**
      {{ type_list }}

      {% if max_triples %}
      Extract up to {{ max_triples }} triples.
      {% endif %}

      **Source text:**
      {{ text }}
